{{- if eq .Release.Namespace "dev" }}
# ─── DEV SealedSecret ─────────────────────────────────────
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: postgres-secret
  namespace: dev
spec:
  encryptedData:
    POSTGRES_PASSWORD: 
    POSTGRES_USER: 
  template:
    metadata:
      creationTimestamp: null
      name: postgres-secret
      namespace: dev
    type: Opaque
{{- else if eq .Release.Namespace "prod" }}
# ─── PROD SealedSecret ─────────────────────────────────────
# TODO: Run kubeseal with namespace=prod to generate encrypted data
# kubeseal --format=yaml < secrets-plain/postgres-secret-prod.yaml > this-file.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: postgres-secret
  namespace: prod
spec:
  encryptedData:
    POSTGRES_PASSWORD: 
    POSTGRES_USER: 
  template:
    metadata:
      creationTimestamp: null
      name: postgres-secret
      namespace: prod
    type: Opaque
{{- end }}
