# HTTPRoutes for SmartHarvest — dynamically targets {{ .Release.Namespace }}
# Route order: /api/v1/auth, /api/v1/users → /api/v1/crops → /api/v1/market → / (catch-all to frontend)
{{- $userSvc := index .Values.services "user-service" -}}
{{- $cropSvc := index .Values.services "crop-advisory-service" -}}
{{- $marketSvc := index .Values.services "marketplace-service" -}}
{{- $frontendSvc := index .Values.services "frontend-service" -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: user-service-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    environment: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: smartharvest-gateway
      namespace: {{ .Release.Namespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/auth
      backendRefs:
        - name: user-service
          port: {{ $userSvc.service.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/users
      backendRefs:
        - name: user-service
          port: {{ $userSvc.service.port }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: crop-advisory-service-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    environment: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: smartharvest-gateway
      namespace: {{ .Release.Namespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/crops
      backendRefs:
        - name: crop-advisory-service
          port: {{ $cropSvc.service.port }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: marketplace-service-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    environment: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: smartharvest-gateway
      namespace: {{ .Release.Namespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/market
      backendRefs:
        - name: marketplace-service
          port: {{ $marketSvc.service.port }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
    environment: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: smartharvest-gateway
      namespace: {{ .Release.Namespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-service
          port: {{ $frontendSvc.service.port }}