# HTTPRoutes for SmartHarvest dev namespace
# Route order: /api/v1/auth, /api/v1/users → /api/v1/crops → /api/v1/market → / (catch-all to frontend)
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: user-service-route
  namespace: smartharvest-dev
  labels:
    app.kubernetes.io/part-of: smartharvest
    environment: dev
spec:
  parentRefs:
    - name: smartharvest-gateway
      namespace: smartharvest-dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/auth
        - path:
            type: PathPrefix
            value: /api/v1/users
      backendRefs:
        - name: user-service
          port: 8001
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: crop-advisory-service-route
  namespace: smartharvest-dev
  labels:
    app.kubernetes.io/part-of: smartharvest
    environment: dev
spec:
  parentRefs:
    - name: smartharvest-gateway
      namespace: smartharvest-dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/crops
      backendRefs:
        - name: crop-advisory-service
          port: 8002
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: marketplace-service-route
  namespace: smartharvest-dev
  labels:
    app.kubernetes.io/part-of: smartharvest
    environment: dev
spec:
  parentRefs:
    - name: smartharvest-gateway
      namespace: smartharvest-dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/market
      backendRefs:
        - name: marketplace-service
          port: 8003
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: smartharvest-dev
  labels:
    app.kubernetes.io/part-of: smartharvest
    environment: dev
spec:
  parentRefs:
    - name: smartharvest-gateway
      namespace: smartharvest-dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-service
          port: 80