{{- $userSvc := index .Values.services "user-service" -}}
{{- $cropSvc := index .Values.services "crop-advisory-service" -}}
{{- $marketSvc := index .Values.services "marketplace-service" -}}
{{- $frontendSvc := index .Values.services "frontend-service" -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: smartharvest-routes
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: smartharvest-gateway
  rules:
    # ── API routes (most specific first) ──────────────────
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/users
      backendRefs:
        - name: user-service
          port: {{ $userSvc.service.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/crops
      backendRefs:
        - name: crop-advisory-service
          port: {{ $cropSvc.service.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/market
      backendRefs:
        - name: marketplace-service
          port: {{ $marketSvc.service.port }}
    # ── Frontend catch-all (least specific, must be last) ─
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-service
          port: {{ $frontendSvc.service.port }}
