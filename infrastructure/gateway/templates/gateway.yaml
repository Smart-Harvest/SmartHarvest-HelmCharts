# Gateway for dev namespace - uses existing kgateway GatewayClass
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: smartharvest-gateway
  namespace: smartharvest-dev
  labels:
    app.kubernetes.io/name: smartharvest-gateway
    app.kubernetes.io/part-of: smartharvest
    environment: dev
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same