# ============================================================
# AgriSmart Platform — Global Centralized Values
# ============================================================
# This is the ONLY values file. Every chart consumes this via:
#   helm install <name> ./<chart> -f values.yaml
# ============================================================

imagePullPolicy: IfNotPresent

# ─── Application Services ────────────────────────────────────

frontend:
  image: preethi236/smartcrop
  tag: frontend-v1
  port: 80
  replicas: 1

userService:
  image: preethi236/smartcrop
  tag: user-v1
  port: 8001
  replicas: 1

cropAdvisoryService:
  image: preethi236/smartcrop
  tag: crop-v1
  port: 8002
  replicas: 1

marketplaceService:
  image: preethi236/smartcrop
  tag: market-v1
  port: 8003
  replicas: 1

# ─── Infrastructure ──────────────────────────────────────────

postgres:
  image: postgres:15-alpine
  port: 5432
  user: postgres
  password: postgres_password
  database: agrismart
  databases:
    user: userdb
    crop: cropdb
    market: marketdb

redis:
  image: redis:7-alpine
  port: 6379

# ─── Shared Environment ──────────────────────────────────────

jwt:
  secret: your_super_secret_jwt_key_change_in_production
  algorithm: HS256
  expiryMinutes: "1440"

openweather:
  apiKey: your_openweather_api_key

# ─── Resource Defaults ───────────────────────────────────────

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"
