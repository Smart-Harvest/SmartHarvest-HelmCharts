apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agrismart-routes
  namespace: default
spec:
  parentRefs:
    - name: agrismart-gateway
  rules:
    # ── API routes (most specific first) ──────────────────
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/users
      backendRefs:
        - name: user-service
          port: {{ .Values.userService.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/crops
      backendRefs:
        - name: crop-advisory-service
          port: {{ .Values.cropAdvisoryService.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/market
      backendRefs:
        - name: marketplace-service
          port: {{ .Values.marketplaceService.port }}
    # ── Frontend catch-all (least specific, must be last) ─
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-service
          port: {{ .Values.frontend.port }}
