{{- $svc := index .Values.services "frontend-service" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  {{- if not (.Values.global.autoscaling.enabled) }}
  replicas: {{ $svc.replicaCount | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "frontend.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: frontend
          image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.service.targetPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ $svc.health.path | default "/" }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ $svc.health.path | default "/" }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml ($svc.resources | default .Values.global.resources) | nindent 12 }}
