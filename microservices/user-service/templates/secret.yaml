{{- if eq .Release.Namespace "dev" }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: user-service-secret
  namespace: dev
spec:
  encryptedData:
    DATABASE_URL: 
    DATABASE_URL_SYNC: 
    JWT_SECRET: 
{{- else if eq .Release.Namespace "prod" }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: user-service-secret
  namespace: prod
spec:
  encryptedData:
    DATABASE_URL: 
    DATABASE_URL_SYNC: 
    JWT_SECRET: 
{{- end }}
