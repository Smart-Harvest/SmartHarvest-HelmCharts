{{- $svc := index .Values.services "crop-advisory-service" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crop-advisory-service
  labels:
    {{- include "crop-advisory-service.labels" . | nindent 4 }}
spec:
  {{- if not (.Values.global.autoscaling.enabled) }}
  replicas: {{ $svc.replicaCount | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "crop-advisory-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "crop-advisory-service.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: crop-advisory-service
          image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: crop-advisory-service-config
            - secretRef:
                name: crop-advisory-service-secret
          livenessProbe:
            httpGet:
              path: {{ $svc.health.path | default "/health" }}
              port: http
            initialDelaySeconds: {{ .Values.global.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.global.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.global.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.global.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ $svc.health.path | default "/health" }}
              port: http
            initialDelaySeconds: {{ .Values.global.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.global.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.global.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.global.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml ($svc.resources | default .Values.global.resources) | nindent 12 }}
