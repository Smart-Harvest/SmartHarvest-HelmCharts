{{- $svc := index .Values.services "crop-advisory-service" -}}
{{- if .Values.global.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: crop-advisory-service
  labels:
    {{- include "crop-advisory-service.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: crop-advisory-service
  minReplicas: {{ $svc.autoscaling.minReplicas | default .Values.global.autoscaling.minReplicas }}
  maxReplicas: {{ $svc.autoscaling.maxReplicas | default .Values.global.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $svc.autoscaling.targetCPUUtilizationPercentage | default .Values.global.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $svc.autoscaling.targetMemoryUtilizationPercentage | default .Values.global.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
