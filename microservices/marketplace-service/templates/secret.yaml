{{- if eq .Release.Namespace "dev" }}
# ─── DEV SealedSecret ─────────────────────────────────────
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: marketplace-service-secret
  namespace: dev
spec:
  encryptedData:
    DATABASE_URL: 
    DATABASE_URL_SYNC: 
    JWT_SECRET: 
  template:
    metadata:
      creationTimestamp: null
      name: marketplace-service-secret
      namespace: dev
    type: Opaque
{{- else if eq .Release.Namespace "prod" }}
# ─── PROD SealedSecret ─────────────────────────────────────
# TODO: Run kubeseal with namespace=prod to generate encrypted data
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: marketplace-service-secret
  namespace: prod
spec:
  encryptedData:
    DATABASE_URL: 
    DATABASE_URL_SYNC: 
    JWT_SECRET: 
  template:
    metadata:
      creationTimestamp: null
      name: marketplace-service-secret
      namespace: prod
    type: Opaque
{{- end }}
