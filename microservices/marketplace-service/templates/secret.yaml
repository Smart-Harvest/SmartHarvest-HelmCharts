apiVersion: v1
kind: Secret
metadata:
  name: marketplace-service-secret
  labels:
    {{- include "marketplace-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://{{ .Values.infrastructure.postgres.user }}:{{ .Values.infrastructure.postgres.password }}@postgres:{{ .Values.infrastructure.postgres.port }}/{{ .Values.infrastructure.postgres.databases.market }}"
  DATABASE_URL_SYNC: "postgresql://{{ .Values.infrastructure.postgres.user }}:{{ .Values.infrastructure.postgres.password }}@postgres:{{ .Values.infrastructure.postgres.port }}/{{ .Values.infrastructure.postgres.databases.market }}"
  JWT_SECRET: {{ .Values.shared.jwt.secret | quote }}
