# ============================================================
# SmartHarvest Platform — Development Environment Overrides
# ============================================================
# Namespace: dev
# Only override what differs from values.yaml
# CI updates image tags here:
#   yq -i ".services.<service-name>.image.tag = \"<tag>\"" values/values-dev.yaml
# ============================================================

global:
  imagePullPolicy: Always
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
services:
  user-service:
    replicaCount: 1
    image:
      repository: preethi236/user-service
      tag: "dev-553ad7cc458555b19919ee8dd6abe067345fa555"
  crop-advisory-service:
    replicaCount: 1
    image:
      repository: preethi236/crop-advisory-service
      tag: "dev-58f1aa2e67419b4e75b4cbca2f20fcc41843a75f"
  marketplace-service:
    replicaCount: 1
    image:
      repository: preethi236/marketplace-service
      tag: "dev-7c1ea25c85f6466c3e07911b6d44ea791ad4bf44"
  frontend-service:
    replicaCount: 1
    image:
      repository: preethi236/frontend-service
      tag: "dev-d51457cddb288d9d9cbdb6b1db58f77c2ed5488f"
infrastructure:
  postgres: {}
  # password is now managed via SealedSecrets
shared:
  jwt: {}
  # secret is now managed via SealedSecrets
