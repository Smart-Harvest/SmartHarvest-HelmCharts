apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
data:
  init.sql: |
    -- Create databases for each microservice
    CREATE DATABASE userdb;
    CREATE DATABASE cropdb;
    CREATE DATABASE marketdb;

    -- Grant privileges
    GRANT ALL PRIVILEGES ON DATABASE userdb TO {{ .Values.postgres.user }};
    GRANT ALL PRIVILEGES ON DATABASE cropdb TO {{ .Values.postgres.user }};
    GRANT ALL PRIVILEGES ON DATABASE marketdb TO {{ .Values.postgres.user }};

    \c userdb
    GRANT ALL ON SCHEMA public TO {{ .Values.postgres.user }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO {{ .Values.postgres.user }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO {{ .Values.postgres.user }};

    \c cropdb
    GRANT ALL ON SCHEMA public TO {{ .Values.postgres.user }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO {{ .Values.postgres.user }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO {{ .Values.postgres.user }};

    \c marketdb
    GRANT ALL ON SCHEMA public TO {{ .Values.postgres.user }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO {{ .Values.postgres.user }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO {{ .Values.postgres.user }};
