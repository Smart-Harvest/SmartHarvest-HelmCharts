global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

frontend http_front
    bind *:80
    default_backend envoy_backend

backend envoy_backend
    # Replace <ENVOY_SERVICE_IP> with the ClusterIP or Node IP if using NodePort
    server envoy <ENVOY_SERVICE_IP>:80 check
